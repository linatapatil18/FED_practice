<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lists</title>
</head>
<body>
    <!--It's an ordered list.-->
    <ol>
        <li>HTML</li>
        <ol type="i">
            <li>Level A</li>
            <li>Level B</li>
            <li>Level B</li>
        </ol>
        <li>C++</li>
        <li>Java</li>
        <li>CSS</li>
    </ol>
    <hr>
    <!--It's an unordered list.-->
    <ul>
        <li>Mango</li>
        <li>Orange</li>
        <li>Apple</li>
        <li>Grapes</li>
        <li>Banana</li>
    </ul>
</body>
</html>
