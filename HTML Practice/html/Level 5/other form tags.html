<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Other form tags</title>
</head>
<body>
    <form action="/contact-me">
        Date: <input type="date"><br><br>
        File: <input type="file"><br><br>
        Color: <input type="color"><br><br>
        Range: <input type="range"><br><br>
        Click me: <input type="button" value="Poked !"><br><br>
        Submit: <input type="submit"><br><br>
        
        <hr>
        <label for="male">Male: </label>
        <input type="radio" name="Gender" value="Male" id="male"><br><br>
        <label for="female">Female: </label>
        <input type="radio" name="Gender" value="Female" id="female"><br><br>
        <label for="other">Other: </label>
        <input type="radio" name="Gender" value="Other" id="other">
        <hr>
        <label for="html">HTML</label>
        <input type="checkbox" name="Subjects" value="Subject 1" id="html"><br><br>
        <label for="css">CSS</label>
        <input type="checkbox" name="Subjects" value="Subject 2" id="css"><br><br>
        <label for="javascript">JavaScript</label>
        <input type="checkbox" name="Subjects" value="Subject 3" id="javascript"><br><br>
        <label for="java">Java</label>
        <input type="checkbox" name="Subjects" value="Subject 4" id="java">
        <hr>
        <label for="country">Select your country</label>
        <select name="country" id="country">
            <option value="India">India</option>
            <option value="London">London</option>
            <option value="Singapore">Singapore</option>
            <option value="America">America</option>
            <option value="China">China</option>
        </select>
        <hr>
        <textarea name="story" id="story" rows="5" cols="20">
            This is a story
        </textarea>
    </form>
</body>
</html>
