<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Label tag</title>
</head>
<body>
    <form action="/contact-me">
        <label for="username">Username</label>
        <input type="text" id="username" required="true">
        <hr>
        <label for="user_password">Passowrd</label>
        <input type="password" id="user_passowrd">
    </form>
</body>
</html>
