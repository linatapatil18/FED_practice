<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image tag</title>
</head>
<body>
    <!--Below image is relative-->
    <image src="rose.png" alt="Image of rose" height="150px"/>
    <hr>
    <!--We can give absolute url using folder name, for example: images/cat.png-->
    <hr>
    <!--Image from internet-->
    <image src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT5KKTlhOCgJq6EpC_KRg8vHBktRM-44aF0NQ&s" alt="Image of dog" width="300px"/>
</body>
</html>
