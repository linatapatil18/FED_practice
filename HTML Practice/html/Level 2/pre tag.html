<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pre tag</title>
</head>
<body>
    <!--In "p" tag space will automatically remove.-->
    <p>
        Dear sir, 

        Thoo, 

        Thank You
    </p>
    <!--In "pre" tag space will remain as it is.-->
    <pre>
        Dear sir, 

        Thoo, 

        Thank You
    </pre>
</body>
</html>
